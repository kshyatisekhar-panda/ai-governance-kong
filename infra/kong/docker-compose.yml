# Local-only Kong Enterprise (free-tier-compatible) for the demo.
# Loads the declarative config from kong.yml and the license from
# license.json. Both files are mounted from this directory into /kong.
#
# Pre-flight (one time):
#   1. Make sure infra/kong/license.json exists locally (it is git-ignored).
#   2. From the repo root, run:
#        docker compose -f infra/kong/docker-compose.yml up -d
#
# The Express governance app is expected to be running on the host at
# :8001 (see kong.yml's host.docker.internal:8001 service URL).

services:
  kong:
    image: kong/kong-gateway:3.9
    container_name: kong-gateway
    restart: unless-stopped
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8002
      # Enterprise license. The file is mounted below; KONG_LICENSE_PATH
      # tells Kong where to load it from. Without this, Kong runs in free
      # mode and the AI plugins that require an enterprise license are
      # disabled. Never check the license file into git — see .gitignore.
      KONG_LICENSE_PATH: /kong/license.json
    ports:
      - "8000:8000"     # proxy
      - "8002:8002"     # admin (local only)
    volumes:
      - ./:/kong:ro
    extra_hosts:
      # Lets the kong.yml service URL "host.docker.internal:8001" resolve
      # on Linux hosts (already resolves on Docker Desktop / macOS / Windows).
      - "host.docker.internal:host-gateway"
