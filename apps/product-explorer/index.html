<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Explorer | AI Governance Gateway</title>
  <link rel="stylesheet" href="../dashboard/shared/app.css">
  <script src="../shared/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <style>
    .badge,
    .region {
      display: inline-flex;
      align-items: center;
      min-height: 20px;
      border-radius: 6px;
      border: 1px solid var(--app-color-outline-variant);
      background: var(--app-color-surface-low);
      color: var(--app-color-on-surface);
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 600;
    }
    .ai-response {
      display: none;
      margin-bottom: 14px;
      padding: 12px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }
    .ai-response .meta {
      margin-top: 8px;
      color: var(--app-color-on-surface-variant);
      font-size: 10px;
    }
    .sales-table {
      max-height: 520px;
      overflow: auto;
    }
    .sales-table thead {
      position: sticky;
      top: 0;
      z-index: 1;
    }
  </style>
</head>
<body>
  <main class="compact-page">
    <section class="page-head">
      <div class="page-kicker">Governed app</div>
      <h1 class="page-title">Sales Explorer</h1>
      <p class="page-subtitle">Filtered business data with a governed AI question path. The dashboard reads as the manager view; this is the app view.</p>
    </section>

    <div class="compact-panel" style="margin-bottom:14px;">
      <div class="input-row">
        <input class="compact-input" type="text" id="ai-input" placeholder="Ask about this data..." onkeydown="if(event.key==='Enter')askAI()">
        <button class="icon-button compact-button--primary" type="button" onclick="askAI()" title="Ask AI">
          <span class="material-symbols-outlined">send</span>
        </button>
      </div>
    </div>
    <div class="ai-response" id="ai-response"></div>

    <div class="summary-grid">
      <div class="summary-card"><div class="label">Records</div><div class="value" id="total-records">0</div></div>
      <div class="summary-card"><div class="label">Revenue</div><div class="value" id="total-revenue">$0</div></div>
      <div class="summary-card"><div class="label">Units</div><div class="value" id="total-units">0</div></div>
      <div class="summary-card"><div class="label">Avg revenue</div><div class="value" id="avg-revenue">$0</div></div>
    </div>

    <div class="compact-panel" style="margin-bottom:14px;">
      <div class="compact-toolbar" style="margin-bottom:0;">
        <div class="control-group">
          <label class="control-label" for="filter-businessArea">Business Area</label>
          <select class="compact-select" id="filter-businessArea" onchange="loadData()"><option value="">All</option></select>
        </div>
        <div class="control-group">
          <label class="control-label" for="filter-category">Category</label>
          <select class="compact-select" id="filter-category" onchange="loadData()"><option value="">All</option></select>
        </div>
        <div class="control-group">
          <label class="control-label" for="filter-product">Product</label>
          <select class="compact-select" id="filter-product" onchange="loadData()"><option value="">All</option></select>
        </div>
        <div class="control-group">
          <label class="control-label" for="filter-brand">Brand</label>
          <select class="compact-select" id="filter-brand" onchange="loadData()"><option value="">All</option></select>
        </div>
        <div class="control-group">
          <label class="control-label" for="filter-region">Region</label>
          <select class="compact-select" id="filter-region" onchange="loadData()"><option value="">All</option></select>
        </div>
        <div class="control-group">
          <label class="control-label" for="filter-month">Month</label>
          <select class="compact-select" id="filter-month" onchange="loadData()"><option value="">All</option></select>
        </div>
        <button class="compact-button" type="button" onclick="clearFilters()">Clear</button>
      </div>
    </div>

    <div class="table-wrap sales-table">
      <table>
        <thead>
          <tr>
            <th onclick="sortBy('month')">Month</th>
            <th onclick="sortBy('businessArea')">Business Area</th>
            <th onclick="sortBy('category')">Category</th>
            <th onclick="sortBy('product')">Product</th>
            <th onclick="sortBy('brand')">Brand</th>
            <th onclick="sortBy('region')">Region</th>
            <th onclick="sortBy('unitsSold')">Units</th>
            <th onclick="sortBy('revenue')">Revenue</th>
          </tr>
        </thead>
        <tbody id="data-table"></tbody>
      </table>
    </div>
  </main>

  <script>
    const API = ['localhost','127.0.0.1','0.0.0.0'].includes(location.hostname) ? 'http://localhost:8000' : '';
    const API_HEADERS = { 'x-api-key': 'ds-key-2024' };
    let currentData = [];
    let sortField = 'revenue';
    let sortDir = -1;

    function esc(value) {
      return String(value ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
    }

    function categoryClass(cat) {
      return String(cat || '').toLowerCase().replace(/\s+/g, '-');
    }

    function formatCurrency(n) {
      return '$' + Number(n || 0).toLocaleString();
    }

    async function loadFilters() {
      const res = await fetch(`${API}/api/filters`, { headers: API_HEADERS });
      const f = await res.json();

      const populate = (id, items) => {
        const el = document.getElementById(id);
        const current = el.value;
        el.innerHTML = '<option value="">All</option>' + (items || []).map((i) => `<option value="${esc(i)}">${esc(i)}</option>`).join('');
        el.value = current;
      };

      populate('filter-businessArea', f.businessAreas);
      populate('filter-category', f.categories);
      populate('filter-product', f.products);
      populate('filter-brand', f.brands);
      populate('filter-region', f.regions);
      populate('filter-month', f.months);
    }

    async function loadData() {
      const fields = ['businessArea', 'category', 'product', 'brand', 'region', 'month'];
      const params = new URLSearchParams();
      fields.forEach((field) => {
        const value = document.getElementById(`filter-${field}`).value;
        if (value) params.set(field, value);
      });

      const res = await fetch(`${API}/api/sales?${params}`, { headers: API_HEADERS });
      const { data, total, totalRevenue, totalUnits } = await res.json();
      currentData = data || [];

      document.getElementById('total-records').textContent = total || 0;
      document.getElementById('total-revenue').textContent = formatCurrency(totalRevenue);
      document.getElementById('total-units').textContent = Number(totalUnits || 0).toLocaleString();
      document.getElementById('avg-revenue').textContent = total > 0 ? formatCurrency(Math.round(totalRevenue / total)) : '$0';

      renderTable();
    }

    function renderTable() {
      const sorted = [...currentData].sort((a, b) => {
        const aVal = a[sortField];
        const bVal = b[sortField];
        if (typeof aVal === 'number') return (aVal - bVal) * sortDir;
        return String(aVal).localeCompare(String(bVal)) * sortDir;
      });

      document.getElementById('data-table').innerHTML = sorted.map((r) => `
        <tr>
          <td>${esc(r.month)}</td>
          <td>${esc(r.businessArea)}</td>
          <td><span class="badge ${categoryClass(r.category)}">${esc(r.category)}</span></td>
          <td>${esc(r.product)}</td>
          <td>${esc(r.brand)}</td>
          <td><span class="region">${esc(r.region)}</span></td>
          <td>${Number(r.unitsSold || 0).toLocaleString()}</td>
          <td>${formatCurrency(r.revenue)}</td>
        </tr>
      `).join('') || '<tr><td colspan="8" class="muted" style="text-align:center;">No matching records</td></tr>';
    }

    function sortBy(field) {
      if (sortField === field) {
        sortDir *= -1;
      } else {
        sortField = field;
        sortDir = -1;
      }
      renderTable();
    }

    function clearFilters() {
      ['businessArea', 'category', 'product', 'brand', 'region', 'month'].forEach((field) => {
        document.getElementById(`filter-${field}`).value = '';
      });
      loadData();
    }

    async function askAI() {
      const input = document.getElementById('ai-input');
      const text = input.value.trim();
      if (!text) return;

      const responseDiv = document.getElementById('ai-response');
      responseDiv.style.display = 'block';
      responseDiv.textContent = 'Thinking...';

      try {
        const res = await fetch(`${API}/ai/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': 'ds-key-2024' },
          body: JSON.stringify({ messages: [{ role: 'user', content: text }] }),
        });

        const data = await res.json();
        if (res.ok) {
          const msg = data.choices?.[0]?.message?.content || 'No response';
          const gw = data.gateway || {};
          const source = gw.data_source ? `Data source: ${gw.data_source}` : 'General';
          responseDiv.innerHTML = `${esc(msg)}<div class="meta">Model: ${esc(gw.model_routed || 'n/a')} | Cost: $${gw.cost_usd?.toFixed(4) || '0.0000'} | ${esc(source)}</div>`;
        } else {
          responseDiv.textContent = `Blocked: ${data.message || data.error}`;
        }
      } catch (e) {
        responseDiv.textContent = 'Failed to reach gateway.';
      }
    }

    loadFilters();
    loadData();
  </script>
  <script src="../dashboard/shared/dist/navigation.js"></script>
  <script>window.PAGE_INFO = { key: 'sales-explorer', title: 'Sales Explorer', subtitle: 'Governed app' };</script>
  <script src="../dashboard/shared/dist/layout.js"></script>
</body>
</html>
