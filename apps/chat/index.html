<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat | AI Governance Gateway</title>
  <link rel="stylesheet" href="../dashboard/shared/app.css">
  <script src="../shared/theme.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
</head>
<body>
  <main class="compact-page compact-page--narrow">
    <section class="page-head">
      <div class="page-kicker">Governed app</div>
      <h1 class="page-title">AI Assistant</h1>
      <p class="page-subtitle">A compact chat path through the same gateway controls used by the dashboard evidence views.</p>
    </section>

    <div class="compact-toolbar">
      <div class="control-group">
        <label class="control-label" for="team-key">Team</label>
        <select class="compact-select" id="team-key">
          <option value="chat-key-2024">Industrial Technique (Atlas Chat)</option>
          <option value="eng-key-2024">Compressor Technique (Service Assistant)</option>
          <option value="ds-key-2024">Vacuum Technique (Product Explorer)</option>
          <option value="mkt-key-2024">Power Technique (Sales Copilot)</option>
        </select>
      </div>
    </div>

    <div class="chat-box" id="chat-box" aria-live="polite"></div>

    <div class="input-row">
      <input class="compact-input" type="text" id="input" placeholder="Ask something..." onkeydown="if(event.key==='Enter')send()">
      <button class="icon-button compact-button--primary" type="button" onclick="send()" title="Send">
        <span class="material-symbols-outlined">send</span>
      </button>
    </div>
  </main>

  <script>
    const GATEWAY = ['localhost','127.0.0.1','0.0.0.0'].includes(location.hostname) ? 'http://localhost:8000' : '';
    const chatBox = document.getElementById('chat-box');

    function addMsg(role, text, meta) {
      const div = document.createElement('div');
      div.className = `msg ${role}`;

      const body = document.createElement('div');
      body.textContent = text;
      div.appendChild(body);

      if (meta) {
        const metaEl = document.createElement('div');
        metaEl.className = 'meta';
        metaEl.textContent = meta;
        div.appendChild(metaEl);
      }

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function send() {
      const input = document.getElementById('input');
      const text = input.value.trim();
      if (!text) return;

      const apiKey = document.getElementById('team-key').value;
      addMsg('user', text);
      input.value = '';

      try {
        const res = await fetch(`${GATEWAY}/ai/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey },
          body: JSON.stringify({ messages: [{ role: 'user', content: text }] }),
        });

        const data = await res.json();
        const kongVersion = res.headers.get('via') || 'direct';
        const kongLatency = res.headers.get('x-kong-proxy-latency') || 'n/a';
        const upstreamLatency = res.headers.get('x-kong-upstream-latency') || 'n/a';
        const rateRemaining = res.headers.get('ratelimit-remaining') || 'n/a';
        const rateLimit = res.headers.get('ratelimit-limit') || 'n/a';
        const kongMeta = `Kong: ${kongVersion} | proxy ${kongLatency}ms | upstream ${upstreamLatency}ms | rate ${rateRemaining}/${rateLimit}`;

        if (res.status === 451 || res.status === 429) {
          addMsg('error', `Blocked: ${data.message || data.error}`, kongMeta);
        } else if (res.status === 401) {
          addMsg('error', `Unauthorized: ${data.message}`, kongMeta);
        } else {
          const msg = data.choices?.[0]?.message?.content || 'No response';
          const gw = data.gateway || {};
          const source = gw.data_source ? ` | data ${gw.data_source}` : '';
          const meta = `Model: ${gw.model_routed || 'n/a'} | cost $${gw.cost_usd?.toFixed(4) || '0.0000'} | latency ${gw.latency_ms || 'n/a'}ms | team ${gw.team || 'n/a'}${source}\n${kongMeta}`;
          addMsg('assistant', msg, meta);
        }
      } catch (e) {
        addMsg('error', 'Connection error. Is the gateway running?');
      }
    }
  </script>
  <script src="../dashboard/shared/dist/navigation.js"></script>
  <script>window.PAGE_INFO = { key: 'chat', title: 'Chat', subtitle: 'Governed app' };</script>
  <script src="../dashboard/shared/dist/layout.js"></script>
</body>
</html>
