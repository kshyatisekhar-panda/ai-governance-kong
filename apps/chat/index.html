<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atlas Copco AI Assistant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f1219; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 40px; }
    .container { width: 600px; }
    h1 { color: #fff; font-size: 20px; margin-bottom: 4px; }
    .subtitle { color: #8892b0; font-size: 12px; margin-bottom: 20px; }
    .chat-box { background: #1a1f35; border: 1px solid #2a3050; border-radius: 12px; height: 400px; overflow-y: auto; padding: 16px; margin-bottom: 12px; }
    .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 10px; max-width: 85%; font-size: 14px; line-height: 1.5; }
    .msg.user { background: #003d66; color: #64ffda; margin-left: auto; }
    .msg.assistant { background: #252b45; color: #e0e0e0; }
    .msg.error { background: rgba(255,82,82,0.15); color: #ff5252; border: 1px solid #ff5252; }
    .msg .meta { font-size: 10px; color: #5a7aaa; margin-top: 6px; }
    .input-row { display: flex; gap: 8px; }
    input { flex: 1; background: #1a1f35; border: 1px solid #2a3050; color: #fff; padding: 12px 16px; border-radius: 10px; font-size: 14px; outline: none; }
    input:focus { border-color: #00a86b; }
    button { background: #003d66; color: #64ffda; border: 1px solid #00a86b; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 600; }
    button:hover { background: #004d80; }
    .team-select { margin-bottom: 12px; display: flex; gap: 8px; align-items: center; }
    select { background: #1a1f35; border: 1px solid #2a3050; color: #fff; padding: 8px 12px; border-radius: 8px; font-size: 13px; }
    label { font-size: 12px; color: #8892b0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Atlas Copco AI Assistant</h1>
    <div class="subtitle">Powered by AI Governance Gateway</div>

    <div class="team-select">
      <label>Team:</label>
      <select id="team-key">
        <option value="chat-key-2024">Industrial Technique (Atlas Chat)</option>
        <option value="eng-key-2024">Compressor Technique (Service Assistant)</option>
        <option value="ds-key-2024">Vacuum Technique (Product Explorer)</option>
        <option value="mkt-key-2024">Power Technique (Sales Copilot)</option>
      </select>
    </div>

    <div class="chat-box" id="chat-box"></div>

    <div class="input-row">
      <input type="text" id="input" placeholder="Ask something..." onkeydown="if(event.key==='Enter')send()"/>
      <button onclick="send()">Send</button>
    </div>
  </div>

  <script>
    const GATEWAY = "http://localhost:8000";
    const chatBox = document.getElementById("chat-box");

    function addMsg(role, text, meta) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.innerHTML = text + (meta ? `<div class="meta">${meta}</div>` : "");
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function send() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;

      const apiKey = document.getElementById("team-key").value;
      addMsg("user", text);
      input.value = "";

      try {
        const res = await fetch(`${GATEWAY}/ai/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json", "x-api-key": apiKey },
          body: JSON.stringify({ messages: [{ role: "user", content: text }] }),
        });

        const data = await res.json();

        // Kong headers
        const kongVersion = res.headers.get("via") || "direct";
        const kongLatency = res.headers.get("x-kong-proxy-latency") || "n/a";
        const upstreamLatency = res.headers.get("x-kong-upstream-latency") || "n/a";
        const rateRemaining = res.headers.get("ratelimit-remaining") || "n/a";
        const rateLimit = res.headers.get("ratelimit-limit") || "n/a";

        const kongMeta = `🦍 ${kongVersion} | Kong: ${kongLatency}ms | Rate: ${rateRemaining}/${rateLimit} remaining`;

        if (res.status === 451 || res.status === 429) {
          addMsg("error", `BLOCKED: ${data.message || data.error}`, kongMeta);
        } else if (res.status === 401) {
          addMsg("error", `Unauthorized: ${data.message}`, kongMeta);
        } else {
          const msg = data.choices?.[0]?.message?.content || "No response";
          const gw = data.gateway || {};
          const source = gw.data_source ? ` | Data: ${gw.data_source} API` : "";
          const meta = `Model: ${gw.model_routed} | Cost: $${gw.cost_usd?.toFixed(4)} | Latency: ${gw.latency_ms}ms | Team: ${gw.team}${source}\n${kongMeta}`;
          addMsg("assistant", msg, meta);
        }
      } catch (e) {
        addMsg("error", "Connection error. Is the gateway running?");
      }
    }
  </script>
</body>
</html>
